<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cheese Game</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial, sans-serif;
    text-align:center;
    background:linear-gradient(135deg,#065f46,#10b981);
    height:100vh;
}

h1{
    color:white;
    margin-top:15px;
    font-size:32px;
}

p{
    color:white;
    font-size:22px;
    font-weight:bold;
}

#score{
    color:yellow;
}

#cheese{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%, -50%);
    font-size:50px;
    border:none;
    background:white;
    border-radius:20px;
    padding:10px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

#backBtn{
    position:fixed;
    bottom:15px;
    left:15px;
    background:white;
    color:#065f46;
    padding:10px 15px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}

@media(max-width:768px){
    h1{
        font-size:26px;
    }

    p{
        font-size:20px;
    }

    #cheese{
        font-size:45px;
        padding:8px;
    }

    #backBtn{
        font-size:14px;
        padding:8px 12px;
    }
}
</style>

</head>
<body>

<h1>🧀 Cheese Game</h1>
<p>Score: <span id="score">0</span></p>

<button id="cheese" onclick="eatCheese()">🧀</button>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<a href="index.html" id="backBtn">⬅ Back</a>

<script>
let score = 0;
let musicStarted = false;

function eatCheese(){

    if(!musicStarted){
        document.getElementById("music").play();
        musicStarted = true;
    }

    score++;
    document.getElementById("score").textContent = score;

    let cheese = document.getElementById("cheese");

    let maxX = window.innerWidth - cheese.offsetWidth;
    let maxY = window.innerHeight - cheese.offsetHeight - 80;

    let randomX = Math.random() * maxX;
    let randomY = Math.random() * maxY + 80;

    cheese.style.left = randomX + "px";
    cheese.style.top = randomY + "px";
    cheese.style.transform = "none";
}
</script>

</body>
</html>
