<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cheese Game</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial, sans-serif;
    text-align:center;
    background:linear-gradient(135deg,#065f46,#10b981);
}

h1{
    color:white;
    margin-top:20px;
}

p{
    color:white;
    font-size:25px;
    font-weight:bold;
}

#score{
    color:yellow;
}

#cheese{
    position:absolute;
    left:200px;
    top:200px;
    font-size:50px;
    border:none;
    background:white;
    border-radius:20px;
    padding:10px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

#backBtn{
    position:fixed;
    bottom:20px;
    left:20px;
    background:white;
    color:#065f46;
    padding:10px 15px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}
</style>

</head>
<body>

<h1>🧀 Cheese Game</h1>

<p>Score: <span id="score">0</span></p>

<button id="cheese" onclick="eatCheese()">
🧀
</button>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<a href="index.html" id="backBtn">
⬅ Back
</a>

<script>
let score = 0;
let size = 50;
let musicStarted = false;

function eatCheese(){

    if(!musicStarted){
        document.getElementById("music").play();
        musicStarted = true;
    }

    score++;
    document.getElementById("score").textContent = score;

    size += 5;

    let cheese = document.getElementById("cheese");

    cheese.style.fontSize = size + "px";

    cheese.style.left =
    Math.random() * (window.innerWidth - 150) + "px";

    cheese.style.top =
    Math.random() * (window.innerHeight - 150) + "px";
}
</script>

</body>
</html>
